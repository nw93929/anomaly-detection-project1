AWSTemplateFormatVersion: '2010-09-09'
Description: DS5220 Anomaly Detection Pipeline - Full Stack

Parameters:
  MyIP:
    Type: String
    Description: Your public IP for SSH access (e.g., 73.12.11.192/32)
    Default: 73.12.11.192/32
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access
    Default: ds5220
  UbuntuAMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Description: Latest Ubuntu 24.04 LTS AMI from SSM
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
  GitRepoURL:
    Type: String
    Description: HTTPS URL of your forked anomaly-detection repo
    Default: https://github.com/nw93929/anomaly-detection-project1.git

Resources:

  # ── S3 Bucket ────────────────────────────────────────────────────────────────
  S3Bucket:
    Type: AWS::S3::Bucket
    DependsOn: SNSTopicPolicy
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Topic: !Ref SNSTopic
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .csv

  # ── Security Group ──────────────────────────────────────────────────────────
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from my IP and API from anywhere
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0

  # ── IAM Role and Instance Profile ───────────────────────────────────────────
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3BucketFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:*
                Resource:
                  - !Sub arn:aws:s3:::${S3Bucket}
                  - !Sub arn:aws:s3:::${S3Bucket}/*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ── EC2 Instance ────────────────────────────────────────────────────────────
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref UbuntuAMI
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            set -ex

            # Update and install dependencies
            apt-get update -y
            apt-get install -y git python3 python3-pip python3-venv

            # Set BUCKET_NAME environment variable
            echo 'BUCKET_NAME=${S3Bucket}' >> /etc/environment
            export BUCKET_NAME='${S3Bucket}'

            # Clone the application repository
            git clone ${GitRepoURL} /opt/anomaly-detection

            # Create virtual environment and install dependencies
            python3 -m venv /opt/anomaly-detection/venv
            /opt/anomaly-detection/venv/bin/pip install -r /opt/anomaly-detection/requirements.txt

            # Start FastAPI as a background process
            cd /opt/anomaly-detection
            nohup /opt/anomaly-detection/venv/bin/fastapi run app.py --host 0.0.0.0 --port 8000 > /var/log/fastapi.log 2>&1 &

  # ── Elastic IP ──────────────────────────────────────────────────────────────
  ElasticIP:
    Type: AWS::EC2::EIP

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      EIP: !Ref ElasticIP

  # ── SNS Topic + Policy ─────────────────────────────────────────────────────
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:aws:s3:::*

  # ── SNS Subscription ───────────────────────────────────────────────────────
  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: http
      Endpoint: !Sub http://${ElasticIP}:8000/notify

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  ElasticIPAddress:
    Description: Elastic IP of the EC2 instance
    Value: !Ref ElasticIP
  APIEndpoint:
    Description: URL of the FastAPI health endpoint
    Value: !Sub http://${ElasticIP}:8000/health
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
